<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manzeel Aryal | Creative Portfolio Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Inter', sans-serif;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

/* PARTICLE CANVAS */

#particles{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* HERO */

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;
}

/* TITLE */

.hero h1{
font-size:clamp(2.5rem,6vw,4rem);
font-weight:500;
line-height:1.1;
background:linear-gradient(90deg,#c084fc,#a855f7,#7c3aed);
-webkit-background-clip:text;
color:transparent;
animation:gradientMove 6s infinite linear;
}

@keyframes gradientMove{
0%{filter:hue-rotate(0deg)}
/* 100%{filter:hue-rotate(360deg)} */
}

.subtitle{
margin-top:15px;
opacity:.7;
font-size:1rem;
}

/* CARDS */

.links{
margin-top:60px;
display:grid;
grid-template-columns:1fr;
gap:18px;
width:100%;
max-width:420px;

}

.card{

padding:18px;
border-radius:16px;

background:rgba(255,255,255,0.05);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.08);

text-decoration:none;
color:white;

font-weight:600;
font-size:1rem;

transition:.35s;

position:relative;
overflow:hidden;
}

.card:before{

content:"";

position:absolute;
inset:0;

background:linear-gradient(120deg,
transparent,
rgba(168,85,247,.6),
transparent);

opacity:0;
transition:.4s;

}

.card:hover:before{
opacity:1;
}

.card:hover{

transform:translateY(-6px) scale(1.02);

box-shadow:
0 10px 40px rgba(168,85,247,.4);

background:rgba(255,255,255,0.08);

}

/* SOCIALS */

.socials{

margin-top:50px;

display:flex;

gap:15px;

flex-wrap:wrap;

justify-content:center;

}

.socials a{

padding:10px 16px;

border-radius:40px;

text-decoration:none;

color:white;

font-size:.9rem;

background:rgba(255,255,255,.06);

border:1px solid rgba(255,255,255,.08);

transition:.3s;

}

.socials a:hover{

background:#9333ea;

transform:translateY(-3px);

box-shadow:0 5px 20px rgba(147,51,234,.5);

}

/* DESKTOP */

@media(min-width:700px){

.links{
grid-template-columns:repeat(2,1fr);
max-width:600px;
}

.hero h1{
font-size:4.5rem;
}

}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<section class="hero">

<h1>Manjil's Portfolio Hub</h1>

<p class="subtitle">
Video Editing • Graphic Design • 3D • Web
</p>

<div class="links">

<a class="card" href="https://vimeo.com/user242590466" target="_blank">
🎬 Video Editing Portfolio (vimeo)
</a>

<a class="card" href="https://www.behance.net/manzeelaryal" target="_blank">
🎨 Graphic Design Portfolio (Behance)
</a>

<a class="card" href="#https://manjilweb.netlify.app/" target="_blank">
🧊 Sketchfab 3D Models (Sketchfab)
</a>

<a class="card" href="#https://manjilweb.netlify.app/" target="_blank">
💻 Web Portfolio 
</a>

</div>

<div class="socials">

<a href="https://www.instagram.com/ma_manjil/" target="_blank" >Instagram</a>
<a href="https://www.linkedin.com/in/manzeel-aryal/" target="_blank" >LinkedIn</a>
<a href="https://www.youtube.com/@personalmzll" target="_blank" >YouTube</a>
<a href="https://github.com/User-manjil" target="_blank">GitHub</a>

</div>

</section>

<script>

const canvas = document.getElementById("particles")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let particles = []

class Particle{

constructor(){

this.x = Math.random()*canvas.width
this.y = Math.random()*canvas.height

this.size = Math.random()*2+1

this.speedX = (Math.random()-.5)*0.5
this.speedY = (Math.random()-.5)*0.5

}

update(){

this.x += this.speedX
this.y += this.speedY

if(this.x > canvas.width) this.x = 0
if(this.x < 0) this.x = canvas.width

if(this.y > canvas.height) this.y = 0
if(this.y < 0) this.y = canvas.height

}

draw(){

ctx.fillStyle="rgba(168,85,247,0.8)"
ctx.beginPath()
ctx.arc(this.x,this.y,this.size,0,Math.PI*2)
ctx.fill()

}

}

function init(){

particles=[]

for(let i=0;i<120;i++){

particles.push(new Particle())

}

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{
p.update()
p.draw()
})

requestAnimationFrame(animate)

}

init()
animate()

window.addEventListener("resize",()=>{

canvas.width=window.innerWidth
canvas.height=window.innerHeight

init()

})

</script>

</body>
</html>
